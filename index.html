<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/70b22805cc.js" crossorigin="anonymous"></script>
    <title>Assignment 5</title>
</head>

<body>
    <!--Container-->
    <div id="container">
        <!--Main-->
        <div class="main">
            <!--Header-->
            <header>
                <div class="user-wrapper">
                    <div class="user-img-holder">
                        <div class="user-img">
                            <img src="Images/seif.jpg" alt="User Image">
                        </div>
                        <div class="user-info">
                            <div class="user-name" style="font-weight: bold;">يوسف أسامة</div>
                            <span class="user-account">حساب مدير</span>
                        </div>
                    </div>
                    <div class="user-connected"> متصل <span class="online"></span></div>
                </div>
                <div class="sitename-wrapper">
                    <div class="sitename">
                        <h2 class="site-name-mudabbir">مدبّر</h2>
                        <span class="site-name-slogan">إدارة أموالك بذكاء</span>
                    </div>
                    <div class="site-name-icon"><i class="fa-solid fa-coins"></i></div>
                </div>
            </header>
            <!--Balance-->
            <div class="balance">
                <div class="balance-card">
                    <span class="type">الرصيد الحالي</span>
                    <div class="amount"> <span class="pounds">جنيه</span> 8,450</div>
                    <span class="arrow">+2.5% <i class="fa-solid fa-arrow-up"></i></span>
                </div>

                <div class="balance-card">
                    <span class="type">الرصيد الحالي</span>
                    <div class="amount"> <span class="pounds">جنيه</span> 15,000</div>
                    <span class="arrow">+8.2% <i class="fa-solid fa-arrow-up"></i></span>
                </div>

                <div class="balance-card">
                    <span class="type">الرصيد الحالي</span>
                    <div class="amount"> <span class="pounds">جنيه</span> 10,000</div>
                    <span class="arrow down">-1.2% <i class="fa-solid fa-arrow-down"></i></span>
                </div>

            </div>
        </div>
        <!--Sidebar-->
        <div class="sidebar">
            <div class="sidebar-wrapper">
                <div class="sidebar-header">
                    <div class="sidebar-sitename">
                        <h2 class="sidebar-name-mudabbir">مدبّر</h2>
                        <span class="sidebar-name-slogan">إدارة أموالك بذكاء</span>
                    </div>
                    <div class="sidebar-name-icon"><i class="fa-solid fa-coins"></i></div>
                </div>
                <div class="sidebar-navigation">

                    <div class="navigation-section-home">
                        <div class="navigation-section-name">الصفحة الرئيسية</div>
                        <div class="navigation-section-icon"><i class="fa-solid fa-house"></i></div>
                    </div>

                    <div class="navigation-section">
                        <div class="navigation-section-name">المعاملات</div>
                        <div class="navigation-section-icon"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
                    </div>


                    <div class="navigation-section">
                        <div class="navigation-section-name">الميزانيات</div>
                        <div class="navigation-section-icon"><i class="fa-solid fa-chart-pie"></i></div>
                    </div>


                    <div class="navigation-section">
                        <div class="navigation-section-name">المدخرات</div>
                        <div class="navigation-section-icon"><i class="fa-solid fa-piggy-bank"></i></div>
                    </div>


                    <div class="navigation-section">
                        <div class="navigation-section-name">الفواتير الشرائية</div>
                        <div class="navigation-section-icon"><i class="fa-solid fa-receipt"></i></div>
                    </div>


                </div>
                <div class="sidebar-procedures">
                    <div class="procedures-title">إجراءات سريعة</div>
                    <div class="sidebar-procedure">
                        <div class="procedure-name">إرسال أموال</div>
                        <div class="procedure-icon send-bg"><i class="fa-solid fa-paper-plane send"></i></div>
                    </div>
                    <div class="sidebar-procedure">
                        <div class="procedure-name">إضافة أموال</div>
                        <div class="procedure-icon add-bg"><i class="fa-solid fa-plus add"></i></div>
                    </div>
                    <div class="sidebar-procedure">
                        <div class="procedure-name">دفع فاتورة</div>
                        <div class="procedure-icon bill-bg"><i class="fa-solid fa-receipt bill"></i></div>
                    </div>
                    <div class="sidebar-procedure">
                        <div class="procedure-name">إستثمار</div>
                        <div class="procedure-icon invest-bg"><i class="fa-solid fa-chart-line invest"></i></div>
                    </div>

                </div>

            </div>
        </div>
    </div>
    </div>
</body>

</html>
