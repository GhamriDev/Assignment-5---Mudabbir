<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/70b22805cc.js" crossorigin="anonymous"></script>
    <title>Mudabbir - Financial</title>
</head>

<body>

    <!--Container Start-->
    <div id="container">

        <!--Side Navbar Start-->

        <div class="sidebar">Sidebar</div>

        <!--Side Navbar End-->
        <!-- ================================================ -->
        <!-- Main Content Start-->
        <main>
            <header>
                <div class="header-site-wrapper">
                    <div class="header-site-icon">
                        <i class="fa-solid fa-coins"></i>
                    </div>
                    <div class="header-site-name">
                        <h2 class="mudabbir-header">مدبّر</h2>
                        <span class="slogan">إدارة أموالك بذكاء</span>
                    </div>

                </div>
                <div class="header-user-wrapper">
                    <div class="user-wrapper-img">
                        <img src="Images/seif.jpg" alt="Seif Osama">
                    </div>
                    <div class="user-wrapper-account">
                        <span class="user-name">يوسف أسامه</span>
                        <span class="user-type">حساب مدير</span>
                    </div>
                    <div class="user-icons">
                        <span class="user-alerts"><i class="fa-regular fa-bell"></i></span>
                        <span class="user-search"><i class="fa-solid fa-magnifying-glass"></i></span>
                    </div>
                    <div class="user-status"><span class="online"></span>متصل</div>
                </div>

            </header>
        </main>
        <!-- Main Content End-->

    </div>




    <!--Container End-->

</body>

</html>
